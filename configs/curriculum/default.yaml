# ═══════════════════════════════════════════════════════════════════════
# 课程学习配置
# 对应文档：src/affordance_guided_interaction/training/README.md §4
# ═══════════════════════════════════════════════════════════════════════

# ── 当前初始阶段（stage_1 / stage_2 / stage_3）───────────────────────
initial_stage: stage_2

# ── 跃迁判定参数（§4.3）─────────────────────────────────────────────
window_size: 50            # 滑动窗口长度 M（计算平均成功率的 epoch 数）
threshold: 0.8             # 跃迁阈值 η_thresh

# ── 三阶段定义（§4.2）─────────────────────────────────────────────
# 阶段跃迁的核心逻辑在 CurriculumManager 中硬编码
# 此处记录各阶段的设计意图供参考：
#
# Stage 1 — push 门 / 无杯
#   学习目标：基础视觉引导接触，先跑通视觉-控制闭环
#   context_probs = {none: 1.0}, door_types = [push]
#
# Stage 2 — push 门 / 单臂持杯
#   学习目标：在单臂持杯约束下学会稳定推门
#   context_probs = {left_only: 0.5, right_only: 0.5}, door_types = [push]
#
# Stage 3 — push 门 / 最终混合分布
#   学习目标：统一覆盖无杯、单臂持杯、双臂持杯
#   context_probs = {none: 0.25, left_only: 0.25, right_only: 0.25, both: 0.25}
