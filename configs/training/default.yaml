runtime_defaults: &runtime_defaults
  headless: true
  device: cuda:0
  seed: 42
  resume: null
  log_dir: runs

ppo_common: &ppo_common
  gamma: 0.99
  lam: 0.95
  clip_eps: 0.2
  value_clip_eps: 0.2
  use_clipped_value_loss: true
  entropy_coef: 0.01
  clip_actions: false
  mixed_precision: false
  model_name: continuous_a2c_direct_std
  network_name: door_push_actor_critic_direct_std
  direct_std:
    enabled: true
    arm_action_dim: 12
    base_action_dim: 3
    arm_init: 0.1
    base_init: 1.0
    validate_positive: true
  adaptive_lr_min: 1.0e-5
  adaptive_lr_max: 1.0e-3
  actor_lr: 1.0e-3
  critic_lr: 1.0e-3
  value_coef: 1.0
  bounds_loss_coef: 0.0
  max_grad_norm: 1.0
  seq_length: 4
  normalize_advantages: true

profiles:
  env_256: &profile_env256
    num_envs: 256
    total_steps: 500_000_000
    n_steps_per_rollout: 24
    checkpoint_interval: 100
    ppo:
      <<: *ppo_common
      num_mini_batches: 4
      num_epochs: 5

  env_512: &profile_env512
    num_envs: 512
    total_steps: 400_000_000
    n_steps_per_rollout: 24
    checkpoint_interval: 75
    ppo:
      <<: *ppo_common
      num_mini_batches: 4
      num_epochs: 5

  env_1024: &profile_env1024
    num_envs: 1024
    total_steps: 300_000_000
    n_steps_per_rollout: 24
    checkpoint_interval: 50
    ppo:
      <<: *ppo_common
      num_mini_batches: 4
      num_epochs: 5

  env_2048: &profile_env2048
    num_envs: 2048
    total_steps: 200_000_000
    n_steps_per_rollout: 24
    checkpoint_interval: 25
    ppo:
      <<: *ppo_common
      num_mini_batches: 4
      num_epochs: 5

  env_4096: &profile_env4096
    num_envs: 4096
    total_steps: 300_000_000
    n_steps_per_rollout: 24
    checkpoint_interval: 20
    ppo:
      <<: *ppo_common
      num_mini_batches: 4
      num_epochs: 5

  env_6144: &profile_env6144
    num_envs: 6144
    total_steps: 3000_000_000
    n_steps_per_rollout: 24
    checkpoint_interval: 20
    ppo:
      <<: *ppo_common
      num_mini_batches: 4
      num_epochs: 5

<<: [*runtime_defaults, *profile_env6144]
