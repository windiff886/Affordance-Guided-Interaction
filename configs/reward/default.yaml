# ═══════════════════════════════════════════════════════════════════════
# 奖励函数超参数配置
# 对应文档：src/affordance_guided_interaction/envs/Reward.md
# ═══════════════════════════════════════════════════════════════════════

# ── 任务奖励 (§4) ──────────────────────────────────────────────────
task:
  w_delta: 5000.0              # 角度增量基准奖励 w_δ
  alpha: 0.3                 # 衰减下限比例 α
  k_decay: 0.5               # 超出目标角度后的衰减速率 k_decay
  w_open: 25000.0               # 任务成功 bonus w_open
  success_angle_threshold: 1.2  # success bonus 触发角度 (rad)
  w_approach: 200.0             # 接近门板大表面奖励权重
  approach_eps: 1.0e-6          # 归一化距离公式分母稳定项
  approach_stop_angle: 0.10     # 门角度超过该阈值后关闭接近奖励

# ── 稳定性奖励 (§5) ──────────────────────────────────────────────
stability:
  w_zero_acc: 0.0            # 零线加速度奖励权重
  lambda_acc: 2.0            # 零线加速度高斯核衰减率
  w_zero_ang: 0.0            # 零角加速度奖励权重
  lambda_ang: 1.0            # 零角加速度高斯核衰减率
  w_acc: 0.05                 # 线加速度惩罚系数
  w_ang: 0.001                 # 角加速度惩罚系数
  w_tilt: 0.03                # 重力倾斜惩罚系数
  w_smooth: 0.01              # 力矩平滑惩罚系数
  w_reg: 0.01                # 力矩正则惩罚系数

# ── 安全惩罚 (§6) ────────────────────────────────────────────────
safety:
  beta_limit: 1.0            # 关节限位系数
  mu: 0.9                    # 关节限位/速度触发比例
  beta_vel: 0.5              # 关节速度系数
  beta_torque: 0.01          # 原始控制力矩超限系数
  w_drop: 100.0              # 杯体脱落惩罚
