# Reward hyperparameters for the handle-free push-door task.
# Aligned with docs/non_cup_push_door_modification_plan.md

# Opening reward
opening:
  scale: 3.0                  # r_o = scale * r_od
  theta_hat: 75.0             # target angle in degrees (75 deg = 75*pi/180 rad)
  theta_pass: 70.0            # stage switch angle in degrees

# Passing reward
passing:
  max_speed: 0.5              # base velocity normalization

# Shaping reward
shaping:
  w_min_arm_motion: 0.3       # r_ma coefficient
  w_stretched_arm: 1.0        # r_psa coefficient
  w_end_effector_to_panel: 1.0 # r_eep coefficient
  w_command_limit: 0.1        # r_pcl coefficient
  w_collision: 2.0            # r_pc coefficient
  stretched_arm_threshold: 0.5
  stretched_arm_scale: 0.1
  cmd_limit_threshold: 1.0
