# ═══════════════════════════════════════════════════════════════════════
# 奖励函数超参数配置
# 对应文档：src/affordance_guided_interaction/rewards/README.md
# ═══════════════════════════════════════════════════════════════════════

# ── 主任务权重 (§9.1) ──────────────────────────────────────────────────
task:
  w_delta: 8.0           # 角度增量基准奖励
  alpha: 0.25            # 超出目标后的权重衰减下限比例
  k_decay: 2.0           # 超出目标角度后的衰减速率系数
  w_open: 10.0           # 任务成功一次性 bonus
  theta_target: 1.57     # 目标门角度 (rad, ≈90°)

# ── 稳定性权重 (§9.2, SoFTA 对齐) ─────────────────────────────────────
stability:
  # (1) 零线加速度奖励（高斯核正激励）
  w_zero_acc: 1.0
  lambda_acc: 0.25
  # (2) 零角加速度奖励（高斯核正激励）
  w_zero_ang: 1.5
  lambda_ang: 0.0044
  # (3) 线加速度惩罚（二次负惩罚）
  w_acc: 0.10
  # (4) 角加速度惩罚（二次负惩罚）
  w_ang: 0.01
  # (5) 重力倾斜惩罚
  w_tilt: 5.0
  # (6) 力矩变化平滑项
  w_smooth: 0.01
  # (7) 力矩幅值正则项
  w_reg: 0.001

# ── 安全惩罚权重 (§9.3) ────────────────────────────────────────────────
safety:
  beta_collision: 0.5    # 无效碰撞系数
  beta_self: 1.0         # 自碰撞固定惩罚
  beta_limit: 0.1        # 关节限位系数
  mu: 0.9                # 关节限位/限速触发比例
  beta_vel: 0.01         # 关节速度系数
  w_drop: 100.0          # 杯体脱落惩罚权重

# ── 动态缩放参数 (§7.2, 全局步数线性退火) ──────────────────────────────
scaling:
  s_min: 0.1             # 退火初始惩罚基数
  n_anneal: 10_000_000   # 退火窗口期（全局环境步数）
