# ═══════════════════════════════════════════════════════════════════════
# 策略网络配置
# 对应文档：src/affordance_guided_interaction/policy/README.md
# ═══════════════════════════════════════════════════════════════════════

# ── Actor 网络 ───────────────────────────────────────────────────────
actor:
  # RecurrentBackbone (GRU)
  rnn_hidden: 512          # GRU 隐状态维度
  rnn_layers: 1            # GRU 层数
  rnn_type: gru            # 循环类型: gru / lstm

  # ActionHead (Gaussian)
  action_dim: 12           # 双臂关节位置目标维度 (rad)
  log_std_init: -0.5       # 动作标准差的初始 log 值

# ── Critic 网络 ──────────────────────────────────────────────────────
critic:
  # 主 MLP 各层维度
  hidden_dims: [512, 256, 128]
