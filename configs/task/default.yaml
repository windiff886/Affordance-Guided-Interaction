# ═══════════════════════════════════════════════════════════════════════
# 任务定义配置
# 对应文档：docs/training_pipeline_detailed.md
# ═══════════════════════════════════════════════════════════════════════

# ── 成功条件参数 ─────────────────────────────────────────────────────
door_angle_target: 1.2     # 门角度成功阈值；episode 仍需同时满足不掉杯 + base_link 过门

# ── 失败条件参数 ─────────────────────────────────────────────────────
cup_drop_threshold: 0.15   # 杯体脱落距离阈值（m）—— 超过即判定杯体脱落

# ── 超时参数 ─────────────────────────────────────────────────────────
# max_episode_steps 在 env/default.yaml 中定义
