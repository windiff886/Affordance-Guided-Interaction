# Task definition for the handle-free push-door task.

# Success conditions
theta_open: 0.5236          # pi/6 rad = 30 deg (opened_enough metric)
theta_pass: 1.2217          # 70*pi/180 rad (stage switch)
theta_hat: 1.3090           # 75*pi/180 rad (opening reward target)
reverse_angle_limit: -0.05  # terminate if door reverses past this

# Timeout
# episode_length_s = 10.0, max_episode_steps = 600 (set in env cfg)
