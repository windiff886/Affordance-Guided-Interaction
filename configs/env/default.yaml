# Environment configuration for the handle-free push-door task.

# Physics simulation
physics_dt: 0.008333       # 1/120 s
decimation: 2              # Control frequency = physics_dt * decimation = 60 Hz

# Control parameters
control:
  action_type: joint_position
  arm_action_scale_rad: 0.25
  torque_proxy_sigma: 0.7
  arm_pd_stiffness: 50.0
  arm_pd_damping: 4.5
  base_max_lin_vel_x: 0.5
  base_max_lin_vel_y: 0.5
  base_max_ang_vel_z: 1.0
  base_command_deadband: 0.1
  wheel_radius: 0.05
  wheel_base_half_length: 0.285
  wheel_base_half_width: 0.2104
  wheel_velocity_limit: 40.0
