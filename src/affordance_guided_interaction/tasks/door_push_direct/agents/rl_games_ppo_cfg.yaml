params:
  seed: 42

  env:
    clip_actions: 1000000.0
    clip_observations: 100.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_direct_std

  network:
    name: door_push_actor_critic_direct_std
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None

        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0.1
        fixed_sigma: True
        direct_std:
          enabled: True
          arm_action_dim: 12
          base_action_dim: 3
          arm_init: 0.1
          base_init: 1.0
          validate_positive: True
    mlp:
      units: [512, 256, 128]
      activation: elu
      d2rl: False

      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ''

  config:
    name: door_push_direct
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    clip_actions: False
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    num_actors: -1
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 1.0e-3
    lr_schedule: adaptive
    kl_threshold: 0.01
    adaptive_lr_max: 1.0e-3
    adaptive_lr_min: 1.0e-5
    score_to_win: 100000000
    max_epochs: 4578
    save_best_after: 20
    save_frequency: 20
    grad_norm: 1.0
    entropy_coef: 0.01
    bounds_loss_coef: 0.0
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 24
    minibatch_size: 4096
    mini_epochs: 5
    critic_coef: 1.0
    clip_value: True
    seq_length: 4
